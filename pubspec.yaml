name: soil_management_app
description: "AI Powered Smart Mobile Application for Soil Nutrient Measurement and Management"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Internationalization (English + Kiswahili)
  intl: any

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.0.0

  # Networking (Django REST API)
  http: ^1.2.0

  # Charts
  fl_chart: ^0.69.0

  # Export
  pdf: ^3.11.0
  printing: ^5.13.0
  excel: ^4.0.4
  path_provider: ^2.1.3
  share_plus: ^10.1.0

  # Settings persistence
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400

        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500

        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800

        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900